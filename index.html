<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>AI Resume Screener</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #0f172a;
            color: white;
        }

        .card {
            background: #1e293b;
            border: none;
            border-radius: 12px;
        }

        iframe {
            width: 100%;
            height: 600px;
            border-radius: 10px;
            border: none;
        }

        .result-box {
            background: #020617;
            padding: 20px;
            border-radius: 10px;
            min-height: 600px;
        }

        .hidden {
            display: none;
        }
    </style>

</head>

<body>

    <div class="container-fluid p-4">

        <div class="d-flex justify-content-between align-items-center">
            <h5>AI Screening Result</h5>
            <button class="btn btn-md btn-outline-danger text-white" onclick="clearStorage()">
                Clear
            </button>
        </div><br>

        <!-- File Upload -->
        <div class="card p-3 mb-4">

            <label class="form-label">Upload Resume (PDF only)</label>

            <input type="file" class="form-control" id="pdfFile" accept="application/pdf">

            <small class="text-muted mt-2">
                Only PDF files allowed
            </small>

        </div>
        <div class="card p-3 mb-4">

            <label class="form-label">Job Description</label>

            <textarea id="jobDescription" class="form-control" rows="6">We are looking for a Junior Web Developer.

Must have:
React
REST APIs
Next.js
Communication skills

Nice to have:
AWS
TypeScript</textarea>

            <div class="text-end mt-3">
                <button class="btn btn-primary" id="analyzeBtn">
                    Analyze Resume
                </button>
            </div>
        </div>

        <!-- Main Layout -->
        <div class="row">

            <!-- PDF Preview -->
            <div class="col-md-6">

                <div class="card p-3">

                    <h5>Resume Preview</h5>

                    <iframe id="pdfPreview" class="hidden"></iframe>

                </div>

            </div><br><br><br><br>


            <!-- AI Result -->
            <div class="col-md-6">
                <div class="card p-3" id="resultSection">

                    <h5>AI Screening Result</h5>

                    <div class="result-box" id="resultBox">

                        <p class="text-muted">
                            Upload a resume to see AI analysis
                        </p>

                    </div>

                </div>

            </div>

        </div>

    </div>


<script>

const pdfInput = document.getElementById("pdfFile");
const preview = document.getElementById("pdfPreview");
const resultBox = document.getElementById("resultBox");

const analyzeBtn = document.getElementById("analyzeBtn");
const jobContainer = document.getElementById("jobDescriptionContainer");

let currentFile = null;


// ---------------------
// Load from localStorage on startup
// ---------------------
window.onload = function () {

    const savedPDF = localStorage.getItem("pdfPreview");
    const savedResult = localStorage.getItem("aiResult");

    if (savedPDF) {

        preview.src = savedPDF;
        preview.classList.remove("hidden");

        jobContainer.classList.remove("hidden");

    }

    if (savedResult) {

        resultBox.innerHTML = savedResult;

    }

};



// ---------------------
// Handle file upload (ONLY preview here)
// ---------------------
pdfInput.addEventListener("change", function () {

    const file = this.files[0];

    if (!file) return;

    if (file.type !== "application/pdf") {

        alert("Only PDF allowed");
        this.value = "";
        return;

    }

    currentFile = file;

    const fileURL = URL.createObjectURL(file);

    preview.src = fileURL;
    preview.classList.remove("hidden");

    jobContainer.classList.remove("hidden");

    // save preview
    localStorage.setItem("pdfPreview", fileURL);

});



// ---------------------
// Analyze button click
// ---------------------
analyzeBtn.addEventListener("click", async function () {

    if (!currentFile) {

        alert("Upload resume first");
        return;

    }

    const jdText = document.getElementById("jobDescription").value;

    if (!jdText.trim()) {

        alert("Enter job description");
        return;

    }


    // scroll to result section
    document.getElementById("resultSection")
        .scrollIntoView({ behavior: "smooth" });


    // show loading
    resultBox.innerHTML = `
        <div class="text-center mt-5">

            <div class="spinner-border text-light"></div>

            <p class="mt-3">AI analyzing resume...</p>

        </div>
    `;


    const formData = new FormData();

    formData.append("resume", currentFile);
    formData.append("job_description", jdText);


    try {

        const res = await fetch("https://resumescreener-g9fy.onrender.com/screen_resume", {

            method: "POST",
            body: formData

        });

        const data = await res.json();


        const htmlResult = `
            <h4>${data.candidate_name}</h4>

            <hr>

            <p><strong>Match Score:</strong> ${data.match_score}%</p>

            <p><strong>Recommendation:</strong> ${data.recommendation}</p>

            <p><strong>Reason:</strong> ${data.reasoning}</p>

            <p><strong>Missing Skills:</strong></p>

            <ul>
                ${data.missing_critical_skills.map(
                    s => `<li>${s}</li>`
                ).join("")}
            </ul>
        `;


        resultBox.innerHTML = htmlResult;

        localStorage.setItem("aiResult", htmlResult);

    }
    catch {

        resultBox.innerHTML = `
            <p class="text-danger">
                Error analyzing resume
            </p>
        `;

    }

});




// ---------------------
// Clear storage function
// ---------------------
function clearStorage() {

    localStorage.removeItem("pdfPreview");
    localStorage.removeItem("aiResult");

    preview.src = "";
    preview.classList.add("hidden");

    jobContainer.classList.add("hidden");

    resultBox.innerHTML = `
        <p class="text-muted">
            Upload a resume to see AI analysis
        </p>
    `;

    pdfInput.value = "";

    currentFile = null;

}


</script>


</body>

</html>
